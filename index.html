<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>lets test ur knowledege</p>
            <button id="start-btn">start quiz</button>
        </div>
        <div class="screen" id="quiz-screen">
         <div class="quiz-header">
            <h2 id="question">Question comes here</h2>
            <div class="quiz-num">
                <p>
                    Question <span id="cureent-q">1</span>of<span id="total-q">10</span>
                </p>

                <p>
                    Score:<span id="score">0</span>
                </p>
            </div>
            <div class="options">
            
            </div>
            <div class="progress--bar">
                <div id="progress" class="progress"></div>

            </div>
         </div>
         </div>
         
         <div id="result-screen" class="screen" >
            <h1>Quiz result</h1>
            <div class="result-info">
                <p>
                    You scored <span id="final-score">6</span>out of <span id="max-score">10</span>
                </p>
                <div id="result-message">Good Job!</div>
            </div>
            <button id="restart-btn">Retsart Quiz</button>
         </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
